# T37: local full-stack development environment.
#
# `docker-compose up --build` boots: Postgres, Redis, MinIO (S3-compatible
# object storage, ADR-0007), MailHog (local SMTP catcher, ADR-0010), the
# backend (runs `alembic upgrade head` on boot, then serves FastAPI), and
# the frontend (Vite dev server). See CLAUDE.md `commands.run`.
#
# No secrets are baked into any image — every credential below is injected
# at container start as compose environment, sourced from `.env` (copy
# `.env.example` to `.env`; never commit `.env`). The defaults here are
# fixed, non-production, local-only placeholder credentials for services
# that only ever bind to the developer's own machine; they are not used
# anywhere in staging/prod (T40 wires real secrets via the platform).
#
# Out of scope: production deployment/orchestration — see T40.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatspace}
      POSTGRES_DB: ${POSTGRES_DB:-chatspace}
    ports:
      # Bind to loopback only: these carry the app's real DB with PII and use
      # fixed local-dev credentials. Publishing on 0.0.0.0 would expose them to
      # the whole LAN. Local tooling still reaches them on 127.0.0.1.
      - "127.0.0.1:5425:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-chatspace} -d ${POSTGRES_DB:-chatspace}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatspace}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatspace-minio}
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: creates the media bucket the app expects (ADR-0007) so
  # the backend doesn't need bucket-provisioning IAM at runtime. Exits
  # after creating/idempotently confirming the bucket; not part of the
  # long-running stack.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatspace}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chatspace-minio}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-chatspace-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/$$S3_BUCKET_NAME
      "

  # Local SMTP catcher (ADR-0010). Mailpit, not MailHog: the app's EmailService
  # always sends SMTP AUTH (username/password are required, non-empty settings),
  # and MailHog advertises no AUTH extension, so aiosmtplib would raise before
  # any mail is caught. Mailpit accepts any credentials when told to, including
  # over a plaintext connection, so invite/reset mail round-trips end-to-end.
  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "127.0.0.1:1025:1025" # SMTP catcher
      - "127.0.0.1:8025:8025" # Web UI to inspect caught mail

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      APP_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chatspace}:${POSTGRES_PASSWORD:-chatspace}@postgres:5432/${POSTGRES_DB:-chatspace}
      REDIS_URL: redis://redis:6379/0

      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-only-signing-key-not-for-prod}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_TTL_MINUTES: 15

      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USERNAME: ${SMTP_USERNAME:-chatspace}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-local-dev-only-smtp-password}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-no-reply@chatspace.example}
      # Mailpit speaks plaintext SMTP locally: no implicit TLS and no STARTTLS
      # upgrade. smtp_start_tls defaults to True in settings, so it must be
      # explicitly disabled here or aiosmtplib would demand a STARTTLS upgrade
      # Mailpit doesn't offer. Both TLS modes off is the one valid local combo.
      SMTP_USE_TLS: "false"
      SMTP_START_TLS: "false"

      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://localhost:5173/password-reset/confirm}
      INVITE_URL_BASE: ${INVITE_URL_BASE:-http://localhost:5173/register}

      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-chatspace-media}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-chatspace}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-chatspace-minio}
      S3_REGION: auto

      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@chatspace.example}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-local-dev-only-admin-pw1}
      BOOTSTRAP_ADMIN_FIRST_NAME: ${BOOTSTRAP_ADMIN_FIRST_NAME:-System}
      BOOTSTRAP_ADMIN_LAST_NAME: ${BOOTSTRAP_ADMIN_LAST_NAME:-Admin}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html

volumes:
  postgres_data:
  redis_data:
  minio_data:
